services:
  - type: web
    name: jogo-da-velha-2-api
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /healthz
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: CLIENT_ORIGIN
        value: "*"
      - key: ROOM_WAITING_TTL_MS
        value: 180000
      - key: ROOM_EMPTY_TTL_MS
        value: 180000
      - key: ROOM_ACTIVE_TTL_MS
        value: 900000
      - key: ROOM_FINISHED_TTL_MS
        value: 180000
      - key: ROOM_CLEANUP_INTERVAL_MS
        value: 30000
